name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchains
        run: |
          rustup toolchain install 1.93.1 --profile minimal
          rustup toolchain install nightly --profile minimal --component rustfmt,clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo +nightly fmt --all --check

      - name: Lint
        run: cargo +nightly clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo +1.93.1 build --workspace

      - name: Test
        run: cargo +1.93.1 test --workspace
